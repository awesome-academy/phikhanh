{{ template "base" . }}
{{ define "content" }}
<div class="space-y-6">
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="bg-white border border-gray-200 rounded-lg p-6">
            <div class="text-4xl font-bold text-gray-900 mb-2">{{ .ApplicationCount }}</div>
            <p class="text-gray-600 text-sm">Total Applications</p>
        </div>
        <div class="bg-white border border-gray-200 rounded-lg p-6">
            <div class="text-4xl font-bold text-gray-900 mb-2">{{ .PendingCount }}</div>
            <p class="text-gray-600 text-sm">Pending</p>
        </div>
        <div class="bg-white border border-gray-200 rounded-lg p-6">
            <div class="text-4xl font-bold text-gray-900 mb-2">{{ .ServiceCount }}</div>
            <p class="text-gray-600 text-sm">Services</p>
        </div>
        <div class="bg-white border border-gray-200 rounded-lg p-6">
            <div class="text-4xl font-bold text-gray-900 mb-2">{{ .UserCount }}</div>
            <p class="text-gray-600 text-sm">Users</p>
        </div>
    </div>
</div>
{{ end }}
