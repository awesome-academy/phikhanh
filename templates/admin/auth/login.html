<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Public Service Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white">
    <div class="min-h-screen flex items-center justify-center">
        <div class="w-full max-w-md">
            <!-- Logo Section -->
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900">Admin Portal</h1>
                <p class="text-gray-600 mt-2">Public Service Management System</p>
            </div>

            <!-- Login Form -->
            <div class="bg-white border border-gray-200 rounded-lg p-8 shadow-sm">
                <h2 class="text-2xl font-bold text-gray-900 mb-6">Login</h2>

                {{ if .Error }}
                <div class="mb-4 p-4 bg-red-50 border border-red-200 rounded-lg">
                    <p class="text-red-700 text-sm font-medium">{{ .Error }}</p>
                </div>
                {{ end }}

                <form action="/admin/login" method="POST" class="space-y-4">
                    <!-- Email -->
                    <div>
                        <label for="email" class="block text-sm font-medium text-gray-700 mb-2">
                            Email
                        </label>
                        <input
                            type="email"
                            id="email"
                            name="email"
                            placeholder="Enter your email"
                            required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        >
                    </div>

                    <!-- Password -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                            Password
                        </label>
                        <input
                            type="password"
                            id="password"
                            name="password"
                            placeholder="Enter your password"
                            required
                            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        >
                    </div>

                    <!-- Submit Button -->
                    <button
                        type="submit"
                        class="w-full mt-6 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-lg transition duration-200"
                    >
                        Login
                    </button>
                </form>

                <!-- Demo Info -->
                <div class="mt-6 p-4 bg-gray-50 rounded-lg border border-gray-200">
                    <p class="text-xs text-gray-600 font-medium mb-2">Demo Credentials:</p>
                    <p class="text-xs text-gray-600">Email: <span class="font-mono font-semibold">admin@example.com</span></p>
                    <p class="text-xs text-gray-600">Password: <span class="font-mono font-semibold">any</span></p>
                    <p class="text-xs text-gray-600 mt-2 italic">Only Staff, Manager, Admin can login</p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
