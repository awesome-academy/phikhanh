{{ define "base" }}
<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ .PageTitle }} - Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-900">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <aside class="w-64 bg-gray-900 text-white flex flex-col flex-shrink-0">
            <div class="p-6 border-b border-gray-700">
                <h1 class="text-xl font-bold">Admin Portal</h1>
                <p class="text-gray-400 text-xs mt-1">Public Service Management</p>
            </div>

            <nav class="flex-1 p-4 space-y-1 overflow-y-auto">
                <a href="/admin/dashboard"
                   class="flex items-center gap-3 px-4 py-3 rounded-lg transition {{ if eq .ActiveMenu "dashboard" }}bg-gray-800 text-white{{ else }}text-gray-300 hover:bg-gray-800 hover:text-white{{ end }}">
                    <span>📊</span><span>Dashboard</span>
                </a>
                <a href="/admin/users"
                   class="flex items-center gap-3 px-4 py-3 rounded-lg transition {{ if eq .ActiveMenu "users" }}bg-gray-800 text-white{{ else }}text-gray-300 hover:bg-gray-800 hover:text-white{{ end }}">
                    <span>👥</span><span>Users</span>
                </a>
                <a href="/admin/services"
                   class="flex items-center gap-3 px-4 py-3 rounded-lg transition {{ if eq .ActiveMenu "services" }}bg-gray-800 text-white{{ else }}text-gray-300 hover:bg-gray-800 hover:text-white{{ end }}">
                    <span>🔧</span><span>Services</span>
                </a>
                <a href="/admin/departments"
                   class="flex items-center gap-3 px-4 py-3 rounded-lg transition {{ if eq .ActiveMenu "departments" }}bg-gray-800 text-white{{ else }}text-gray-300 hover:bg-gray-800 hover:text-white{{ end }}">
                    <span>🏢</span><span>Departments</span>
                </a>
                <a href="/admin/applications"
                   class="flex items-center gap-3 px-4 py-3 rounded-lg transition {{ if eq .ActiveMenu "applications" }}bg-gray-800 text-white{{ else }}text-gray-300 hover:bg-gray-800 hover:text-white{{ end }}">
                    <span>📋</span><span>Applications</span>
                </a>
                <a href="/admin/activity-logs"
                   class="flex items-center gap-3 px-4 py-3 rounded-lg transition {{ if eq .ActiveMenu "activity-logs" }}bg-gray-800 text-white{{ else }}text-gray-300 hover:bg-gray-800 hover:text-white{{ end }}">
                    <span>📝</span><span>Activity Log</span>
                </a>
            </nav>

            <div class="p-4 border-t border-gray-700">
                <div class="px-4 py-2 mb-2">
                    <p class="text-sm font-medium text-white">{{ .AdminName }}</p>
                    <p class="text-xs text-gray-400 capitalize">{{ .AdminRole }}</p>
                </div>
                <form action="/admin/logout" method="POST">
                    <button type="submit" class="w-full px-4 py-2 bg-red-600 hover:bg-red-700 text-white rounded-lg transition text-sm font-medium">
                        🚪 Logout
                    </button>
                </form>
            </div>
        </aside>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <header class="bg-white border-b border-gray-200 px-6 py-4 flex-shrink-0">
                <h2 class="text-xl font-bold text-gray-900">{{ .PageTitle }}</h2>
            </header>
            <main class="flex-1 overflow-auto p-6">
                {{ template "content" . }}
            </main>
        </div>
    </div>
</body>
</html>
{{ end }}
